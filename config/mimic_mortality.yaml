# MIMIC-IV 1-year post-discharge mortality (forward-looking risk panel).
# Build the feature/label tables first:
#   python -m agentic_ehr.data.mimic.build --root <MIMIC_ROOT> --out-dir artifacts/mimic
# then: agentic-ehr --config config/mimic_mortality.yaml train

seed: 42

data:
  source: mimic
  mimic:
    events_path: artifacts/mimic/events.parquet
    labels_path: artifacts/mimic/labels_mortality_1y.parquet
  featurize:
    lookback_days: 3650          # all feature events are stamped at the discharge anchor
    max_features: 200
    numeric_codes: auto          # detect VITAL/*, LAB/*, UTIL/* numeric features from data

task:
  name: "mimic_mortality_1y"
  description: "Risk of death within one year of hospital discharge"
  positive_label: "death within one year of discharge"
  horizon: "the next 12 months"

model:
  name: xgboost
  params:
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.8
    reg_lambda: 1.0
    random_state: 42
    n_jobs: 4
  calibrate: true
  calibration_method: isotonic

explain:
  top_k_contributors: 5
  method: auto
  concept_map_path: null

agent:
  # NOTE: MIMIC is credentialed under the PhysioNet DUA. Sending MIMIC-derived
  # content to a hosted LLM may violate it unless the endpoint is covered
  # (no data retention/training). Configure Gemini accordingly before running
  # `demo` / `evaluate --n-summaries` on real data.
  risk_tiers:
    - {max: 0.10, tier: low}
    - {max: 0.30, tier: moderate}
    - {max: 1.01, tier: elevated}
  llm:
    provider: gemini
    model: null
    max_tokens: 4000

paths:
  model_dir: artifacts/models_mimic_mortality
  reports_dir: artifacts/reports

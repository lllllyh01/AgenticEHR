# MIMIC-IV prolonged-stay prediction (binary: hospital LOS >= 7 days).
# Build the feature/label tables first:
#   python -m agentic_ehr.data.mimic.build --root <MIMIC_ROOT> --out-dir artifacts/mimic
# then: agentic-ehr --config config/mimic_los_long.yaml train

seed: 42

data:
  source: mimic
  mimic:
    events_path: artifacts/mimic/events.parquet
    labels_path: artifacts/mimic/labels_los_long.parquet
  featurize:
    lookback_days: 3650
    max_features: 200
    numeric_codes:
      - LAB/HBA1C
      - LAB/TRIGLYCERIDES
      - VITAL/WEIGHT_KG
      - VITAL/HEIGHT_CM
      - VITAL/BMI
      - VITAL/BP_SYSTOLIC
      - VITAL/BP_DIASTOLIC

task:
  name: "mimic_prolonged_stay"
  description: "Risk of a prolonged hospital stay (7 days or more), from the first 48h of data"
  positive_label: "a prolonged hospital stay (7 days or more)"
  horizon: "this hospital admission"

model:
  name: xgboost
  params:
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.8
    reg_lambda: 1.0
    random_state: 42
    n_jobs: 4
  calibrate: true
  calibration_method: isotonic

explain:
  top_k_contributors: 5
  method: auto
  concept_map_path: null

agent:
  risk_tiers:
    - {max: 0.10, tier: low}
    - {max: 0.30, tier: moderate}
    - {max: 1.01, tier: elevated}
  llm:
    provider: gemini
    model: null
    max_tokens: 4000

paths:
  model_dir: artifacts/models_mimic_los_long
  reports_dir: artifacts/reports

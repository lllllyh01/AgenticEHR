# Config for running the pipeline through the REAL data.source=femr loader,
# using a FEMR/EHR-shot-format DUMMY dataset (generated by scripts/make_femr_dummy.py).
# This is a stand-in for gated EHR-shot data: same code path, dummy patients.

seed: 42

data:
  source: femr                       # <-- real on-disk FEMR loader, not synthetic
  femr:
    events_path: artifacts/femr_dummy/events.csv
    labels_path: artifacts/femr_dummy/labels.csv
  featurize:
    lookback_days: 365
    max_features: 200

task:
  name: "12_month_hospitalization"
  description: "Risk of unplanned hospitalization within 12 months"
  positive_label: "hospitalization within 12 months"
  horizon: "the next 12 months"

model:
  name: xgboost
  params:
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.8
    reg_lambda: 1.0
    random_state: 42
    n_jobs: 4
  calibrate: true
  calibration_method: isotonic

explain:
  top_k_contributors: 5
  method: auto
  concept_map_path: null

agent:
  # The LLM agent is the only summary generator. `train` and the predictive
  # `evaluate` metrics do not need it; generating summaries (demo / evaluate
  # --n-summaries) requires the provider's API key to be set.
  risk_tiers:
    - {max: 0.10, tier: low}
    - {max: 0.30, tier: moderate}
    - {max: 1.01, tier: elevated}
  llm:
    provider: gemini          # gemini | claude | openai
    model: null               # null -> provider's best default (gemini: gemini-2.5-pro)
    max_tokens: 4000

paths:
  model_dir: artifacts/models_femr
  reports_dir: artifacts/reports
